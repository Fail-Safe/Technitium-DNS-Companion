name: Feature Request
description: Suggest an idea or improvement for the Companion
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Before opening an issue, consider starting a [Discussion](https://github.com/Fail-Safe/Technitium-DNS-Companion/discussions) — it's a good place to brainstorm and get early feedback before a formal request.

  - type: dropdown
    id: feature_area
    attributes:
      label: Feature area
      description: Which part of the Companion does this relate to?
      options:
        - DNS Logs
        - DNS Filtering / Advanced Blocking
        - DNS Schedules
        - Domain Groups
        - Log Alerts
        - Configuration Sync
        - DHCP
        - DNS Zones
        - DNS Lookup
        - Authentication / Token Setup
        - Docker / Deployment
        - Other / General
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or gap. What are you trying to do that's currently difficult or impossible?
      placeholder: "I'm trying to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about, or workarounds you're currently using?

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to related issues or discussions, or anything else that helps paint the picture.
